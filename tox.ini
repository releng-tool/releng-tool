# ######################################################################
# tests non-editable installs, to ensure interpreters package correctly
# ######################################################################

[testenv:{py310-,py311-,py312-,py313-,py314-,py315-}release]
usedevelop =
    false

# ######################################################################
# linters
# ######################################################################

[testenv:mypy]
deps =
    {[testenv]deps}
    mypy: mypy==2.1.0
setenv =
    {[testenv]setenv}
    MYPY_CACHE_DIR={toxworkdir}/.mypy_cache
commands =
    mypy \
    releng_tool

[testenv:pylint]
deps =
    {[testenv]deps}
    pylint: pylint==4.0.5
setenv =
    {[testenv]setenv}
    PYLINTHOME={toxworkdir}/.pylint_cache
commands =
    pylint \
    releng_tool \
    scripts \
    tests

[testenv:ruff]
deps =
    {[testenv]deps}
    ruff: ruff==0.15.17
setenv =
    {[testenv]setenv}
    RUFF_CACHE_DIR={toxworkdir}/.ruff_cache
commands =
    ruff \
    check \
    releng_tool \
    scripts \
    tests
