[tox]
envlist =
    # linters
    ruff
    pylint
    mypy
    # unit tests
    py{310,311,312,313,314}
    pypy3

[testenv]
commands =
    {envpython} -m tests {posargs}
deps =
passenv =
    ACTIONS_RUNNER_DEBUG
    CI_DEBUG_TRACE
    RUNNER_DEBUG
setenv =
    PIP_DISABLE_PIP_VERSION_CHECK=1
    PYTHONDONTWRITEBYTECODE=1
usedevelop =
    true

# ######################################################################
# environment to verify the ability to install all extra packages
# ######################################################################

[testenv:extras]
extras =
    all

# ######################################################################
# unit testing related to specific features which require external tools
# ######################################################################

[testenv:tools]
commands =
    {envpython} -m tests --test-dir tool-tests {posargs}
deps =
    {[testenv]deps}
    -r{toxinidir}/requirements-tools.txt
passenv =
    *

[testenv:{py310-,py311-,py312-,py313-,py314-,py315-}tools]
commands =
    {envpython} -m tests --test-dir tool-tests {posargs}
deps =
    {[testenv:tools]deps}
passenv =
    *

[testenv:tools-py-flit]
commands =
    {envpython} -m tests --test-dir tool-tests {posargs:-- python_flit}
deps =
    {[testenv]deps}
extras =
    py-flit
passenv =
    *

[testenv:tools-py-flit-old-installer]
commands =
